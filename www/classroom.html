<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom | CampusLink Workspace</title>
  <meta name="description" content="Premium teacher dashboard workspace for CampusLink Classroom.">
  
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Global Styles -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      background-color: #ffffff;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    /* Premium custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #E2E8F0;
      border-radius: 10px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #334155;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #CBD5E1;
    }
    
    /* Ripple-like active state animation */
    .ripple-btn {
      position: relative;
      overflow: hidden;
    }
    .ripple-btn::after {
      content: "";
      background: rgba(255, 255, 255, 0.3);
      display: block;
      position: absolute;
      border-radius: 50%;
      padding-top: 240%;
      padding-left: 240%;
      margin-top: -120%;
      margin-left: -120%;
      opacity: 0;
      transition: all 0.8s;
    }
    .ripple-btn:active::after {
      padding-top: 0;
      padding-left: 0;
      margin-top: 0;
      margin-left: 0;
      opacity: 0.9;
      transition: 0s;
    }
  </style>
</head>
<body class="bg-white text-slate-800 dark:bg-slate-950 dark:text-slate-100">

  <!-- React Mount Point -->
  <div id="root"></div>

  <script src="https://cdn.tailwindcss.com"></script>

      } else {

        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmZWVxZ29remt6YmxkZGVmaHhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTM1NTIsImV4cCI6MjA5NjA4OTU1Mn0.vzeLfLLeOajdsUaE__jvs_VoxzbvmX0j7p3GVAa26lI';

  <script>
    tailwind.config = {

        extend: {
          colors: {

              DEFAULT: '#2563EB',

  </script>

  <!-- Mount Babel Compiled JS Controller -->
  <script type="text/babel" data-type="module" src="classroom.js"></script>
</body>
</html>
