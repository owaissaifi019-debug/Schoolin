<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Immediate theme synchronization
    (function() {
      const savedTheme = localStorage.getItem('campuslink-theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const currentTheme = savedTheme || systemTheme;
      document.documentElement.setAttribute('data-theme', currentTheme);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Profile | CampusLink</title>
</head>
<body class="college-profile-body" style="margin: 0; padding: 0;">

  <div id="loader-screen" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #ffffff; z-index: 999999; font-family: sans-serif;">
    <div style="text-align: center;">
      <div style="font-size: 2.2rem; font-weight: 800; color: #0056B3; letter-spacing: -1px; margin-bottom: 8px;">CampusLink</div>
      <div style="font-size: 0.9rem; color: #64748B;">Preparing College Profile...</div>
    </div>
  </div>

  <div id="college-profile-root"></div>

  <script>
    async function loadProfile() {
      try {
        console.log('[College Profile Loader] Fetching base school profile layout...');
        const response = await fetch('school-profile.html');
        if (!response.ok) throw new Error('Failed to fetch school-profile.html template');
        
        let html = await response.text();
        
        // Terminology translations
        html = html.replaceAll('School Profile | CampusLink', 'College Profile | CampusLink');
        html = html.replaceAll('About the School', 'About the College');
        html = html.replaceAll('About School', 'About College');
        html = html.replaceAll('School Type', 'College Type');
        html = html.replaceAll('Intake Grades', 'Degrees Offered');
        html = html.replaceAll('Nursery to XII', 'Undergraduate / Postgraduate');
        html = html.replaceAll('Co-Educational', 'Co-Educational College');
        html = html.replaceAll('Edit School Profile', 'Edit College Profile');
        html = html.replaceAll('School Name', 'College Name');
        html = html.replaceAll('School Logo', 'College Logo');
        html = html.replaceAll('school-profile.html', 'college-profile.html');
        html = html.replaceAll('school-admin-body', 'college-admin-body');
        html = html.replaceAll('Edit School', 'Edit College');
        html = html.replaceAll('Delhi Public School', 'Delhi Public College');
        html = html.replaceAll('Affiliation Board', 'Affiliated University');
        html = html.replace(
          `<select id="edit-sch-board">
                <option value="">Select Board...</option>
                <option value="CBSE">CBSE (Central Board of Secondary Education)</option>
                <option value="ICSE">CISCE / ICSE (Indian School Certificate)</option>
                <option value="State">State Board</option>
                <option value="IB">IB (International Baccalaureate) / Cambridge</option>
              </select>`,
          `<select id="edit-sch-board">
                <option value="">Select University...</option>
                <option value="UGC">UGC (University Grants Commission)</option>
                <option value="State">State University</option>
                <option value="Deemed">Deemed University</option>
                <option value="Private">Private University</option>
              </select>`
        );
        
        // Override dashboard script to our college wrapper
        html = html.replaceAll('school-profile.js?v=2.0', 'college-profile.js?v=2.0');
        
        // Remove loader and inject
        document.getElementById('loader-screen').remove();
        document.getElementById('college-profile-root').innerHTML = html;
        
        // Sequentially execute script tags
        const scriptElements = Array.from(document.getElementById('college-profile-root').querySelectorAll('script'));
        for (const script of scriptElements) {
          await new Promise((resolve) => {
            const newScript = document.createElement('script');
            if (script.src) {
              if (script.src.includes('school-profile.js')) {
                console.log('[College Profile Loader] Intercepting school-profile.js...');
                fetch('school-profile.js')
                  .then(res => res.text())
                  .then(js => {
                    // Translate redirection guard logic first to prevent loop
                    js = js.replace(
                      `if (dbSchool && dbSchool.institution_type && dbSchool.institution_type !== 'school') {
            console.log('[Routing Guard] Institution is a College. Redirecting to college-profile.html...');
            window.location.href = \`college-profile.html\${window.location.search}\`;
            return;
          }`,
                      `if (dbSchool && (!dbSchool.institution_type || dbSchool.institution_type === 'school')) {
            console.log('[Routing Guard] Institution is a School. Redirecting to school-profile.html...');
            window.location.href = \`school-profile.html\${window.location.search}\`;
            return;
          }`
                    );

                    // Translate terminology in JS (but keep database structures intact)
                    js = js.replaceAll('school-profile.html', 'college-profile.html');
                    js = js.replaceAll('School Profile Settings', 'College Profile Settings');
                    js = js.replaceAll('School Representative', 'College Representative');
                    js = js.replaceAll('School Admin', 'College Admin');
                    js = js.replaceAll('School Partner', 'College Partner');
                    js = js.replaceAll('School Profile', 'College Profile');
                    js = js.replaceAll('My School', 'My College');
                    js = js.replaceAll('Edit School', 'Edit College');
                    
                    // Replace Affiliated Board references in JS
                    js = js.replace('boardBadge.textContent = `${currentProfile.board} Affiliated`;', 'boardBadge.textContent = `${currentProfile.board} Affiliated University`;');
                    js = js.replaceAll('Affiliation Board', 'Affiliated University');
                    
                    // Replace user-facing alert messages and DOM labels
                    js = js.replaceAll("School Name", "College Name");
                    js = js.replaceAll("School Logo", "College Logo");
                    js = js.replaceAll("School description", "College description");
                    js = js.replaceAll("school description", "college description");
                    js = js.replaceAll("school profile", "college profile");
                    js = js.replaceAll("School Profile", "College Profile");
                    
                    newScript.textContent = js;
                    document.body.appendChild(newScript);
                    resolve();
                  })
                  .catch(err => {
                    console.error('[College Profile Loader] Failed to translate school-profile.js:', err);
                    resolve();
                  });
              } else {
                newScript.src = script.src;
                newScript.onload = () => resolve();
                newScript.onerror = () => resolve();
                document.body.appendChild(newScript);
              }
            } else {
              newScript.textContent = script.textContent;
              document.body.appendChild(newScript);
              resolve();
            }
          });
        }
        
        console.log('[College Profile Loader] All scripts executed. Dispatching DOMContentLoaded...');
        document.dispatchEvent(new Event('DOMContentLoaded'));
      } catch (err) {
        console.error('[College Profile Loader] Error:', err);
        document.getElementById('loader-screen').innerHTML = `
          <div style="text-align: center; color: #EF4444; padding: 20px;">
            <h3>Failed to load College Profile</h3>
            <p>${err.message}</p>
          </div>
        `;
      }
    }
    window.addEventListener('DOMContentLoaded', loadProfile);
  </script>
</body>
</html>
