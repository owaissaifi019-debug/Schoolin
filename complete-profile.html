<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Profile | CampusLink</title>
  <meta name="description" content="Complete your profile registration to access your CampusLink account.">
  <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body class="auth-page-body">

  <!-- Background Decorative Elements -->
  <div class="auth-bg-shapes">
    <div class="auth-bg-shape auth-bg-shape-1"></div>
    <div class="auth-bg-shape auth-bg-shape-2"></div>
    <div class="auth-bg-shape auth-bg-shape-3"></div>
  </div>

  <div class="auth-page-wrapper" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    
    <div class="profile-complete-card">
      <div class="profile-complete-header">
        <div id="complete-avatar-container">
          <!-- Dynamically populated -->
          <div class="complete-avatar-placeholder">U</div>
        </div>
        <h2 id="complete-name">Complete Your Profile</h2>
        <p id="complete-email">loading...</p>
      </div>

      <form id="complete-profile-form">
        
        <!-- User Type — visual role cards -->
        <div class="form-group">
          <label style="font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 10px; color: var(--text-main);">I want to join as *</label>
          <!-- Hidden select keeps the existing logic validation intact -->
          <select id="complete-user-type" required style="display:none;" aria-hidden="true" tabindex="-1">
            <option value="">Select your role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="parent">Parent</option>
            <option value="alumni">Alumni</option>
            <option value="school_representative">School Rep</option>
          </select>
          <!-- Visual role card grid -->
          <div class="role-card-grid" id="role-card-grid" role="radiogroup" aria-label="Select your role" style="margin-bottom: 15px;">
            <button type="button" class="role-card" data-role="student" role="radio" aria-checked="false" id="role-student">
              <span class="role-card-icon">🎓</span>
              <span class="role-card-label">Student</span>
            </button>
            <button type="button" class="role-card" data-role="teacher" role="radio" aria-checked="false" id="role-teacher">
              <span class="role-card-icon">👩‍🏫</span>
              <span class="role-card-label">Teacher</span>
            </button>
            <button type="button" class="role-card" data-role="parent" role="radio" aria-checked="false" id="role-parent">
              <span class="role-card-icon">👪</span>
              <span class="role-card-label">Parent</span>
            </button>
            <button type="button" class="role-card" data-role="alumni" role="radio" aria-checked="false" id="role-alumni">
              <span class="role-card-icon">🎖️</span>
              <span class="role-card-label">Alumni</span>
            </button>
            <button type="button" class="role-card" data-role="school_representative" role="radio" aria-checked="false" id="role-school-rep" style="grid-column: span 2;">
              <span class="role-card-icon">🏫</span>
              <span class="role-card-label">School Rep</span>
            </button>
          </div>
          <span class="error-msg" id="err-complete-user-type" style="color: #EF4444; font-size: 0.75rem; display: none; margin-top: 4px;"></span>
        </div>

        <!-- School -->
        <div class="form-group" style="margin-bottom: 20px;">
          <label for="complete-school" style="font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 8px; color: var(--text-main);">School *</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
            <select id="complete-school" required style="width: 100%; padding: 12px 14px 12px 42px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text-main); font-size: 0.95rem; outline: none; transition: var(--transition-fast); appearance: none; -webkit-appearance: none;">
              <option value="">Select your School</option>
              <!-- Dynamically populated -->
            </select>
            <div style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted);">▼</div>
          </div>
          <span class="error-msg" id="err-complete-school" style="color: #EF4444; font-size: 0.75rem; display: none; margin-top: 4px;"></span>
        </div>

        <!-- Class -->
        <div class="form-group" style="margin-bottom: 20px;">
          <label for="complete-class" style="font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 8px; color: var(--text-main);">Class *</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5v-15A2.5 2.5 0 0 1 6.5 2M20 2v20"/></svg>
            <input type="text" id="complete-class" placeholder="e.g. 10th Grade, 12th Science" required style="width: 100%; padding: 12px 14px 12px 42px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text-main); font-size: 0.95rem; outline: none; transition: var(--transition-fast);">
          </div>
          <span class="error-msg" id="err-complete-class" style="color: #EF4444; font-size: 0.75rem; display: none; margin-top: 4px;"></span>
        </div>

        <!-- Section -->
        <div class="form-group" style="margin-bottom: 20px;">
          <label for="complete-section" style="font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 8px; color: var(--text-main);">Section *</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <input type="text" id="complete-section" placeholder="e.g. Section A, Commerce" required style="width: 100%; padding: 12px 14px 12px 42px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text-main); font-size: 0.95rem; outline: none; transition: var(--transition-fast);">
          </div>
          <span class="error-msg" id="err-complete-section" style="color: #EF4444; font-size: 0.75rem; display: none; margin-top: 4px;"></span>
        </div>

        <!-- Batch -->
        <div class="form-group" style="margin-bottom: 20px;">
          <label for="complete-batch" style="font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 8px; color: var(--text-main);">Batch *</label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <input type="text" id="complete-batch" placeholder="e.g. 2024-2026, 2025" required style="width: 100%; padding: 12px 14px 12px 42px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text-main); font-size: 0.95rem; outline: none; transition: var(--transition-fast);">
          </div>
          <span class="error-msg" id="err-complete-batch" style="color: #EF4444; font-size: 0.75rem; display: none; margin-top: 4px;"></span>
        </div>

        <!-- Phone (optional) -->
        <div class="form-group" style="margin-bottom: 30px;">
          <label for="complete-phone" style="font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 8px; color: var(--text-main);">Phone Number <span style="color: var(--text-muted); font-weight: 400;">(optional)</span></label>
          <div class="input-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <input type="tel" id="complete-phone" placeholder="e.g. +91 98765 43210" style="width: 100%; padding: 12px 14px 12px 42px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text-main); font-size: 0.95rem; outline: none; transition: var(--transition-fast);">
          </div>
          <span class="error-msg" id="err-complete-phone" style="color: #EF4444; font-size: 0.75rem; display: none; margin-top: 4px;"></span>
        </div>

        <button type="submit" class="btn btn-primary auth-submit-btn" id="btn-complete-submit">
          <span class="btn-text">Complete Setup</span>
          <span class="btn-loader" style="display:none;">
            <span class="spinner"></span>
          </span>
        </button>

      </form>
    </div>

  </div>

  <!-- Toast -->
  <div class="auth-toast" id="auth-toast" style="display:none;">
    <span class="auth-toast-icon">⚠</span>
    <span class="auth-toast-msg" id="auth-toast-msg"></span>
    <button class="auth-toast-close" id="auth-toast-close">&times;</button>
  </div>

  <!-- Supabase CDN & Modules -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="complete-profile.js"></script>
  
  <script>
    /* ── Role Card Grid Bindings ── */
    (function () {
      const grid = document.getElementById('role-card-grid');
      const hiddenSelect = document.getElementById('complete-user-type');
      if (!grid || !hiddenSelect) return;

      grid.querySelectorAll('.role-card').forEach(function (card) {
        card.addEventListener('click', function () {
          // Clear all
          grid.querySelectorAll('.role-card').forEach(function (c) {
            c.classList.remove('selected');
            c.setAttribute('aria-checked', 'false');
          });
          // Select clicked
          card.classList.add('selected');
          card.setAttribute('aria-checked', 'true');
          // Sync hidden select
          hiddenSelect.value = card.getAttribute('data-role');
          hiddenSelect.dispatchEvent(new Event('change', { bubbles: true }));
          // Clear validation error if any
          var errEl = document.getElementById('err-complete-user-type');
          if (errEl) errEl.style.display = 'none';
        });
      });
    })();
  </script>
</body>
</html>
